{% extends "base.html" %}

{% block title %}Weather Insider Prep{% endblock %}

{% block content %}
    <h1>Weather Insider Prep</h1>

    <div style="display: flex; gap: 10px; align-items: center;">
        <input type="text" id="zip" name="zipcode" placeholder="Enter Zipcode Here" style="flex: 1; min-width: 120px; margin-bottom: 0;">
        <button onclick="grab_location_data();" class="btn-primary" style="width: auto; padding: 14px 24px;">Go</button>
        <button onclick="grab_default_data();" class="btn-secondary" style="width: auto; padding: 14px 24px;">Default Location</button>
    </div>

    <div id="divResults"></div>
{% endblock %}

{% block scripts %}
    <script src="{{ url_for('static', filename='weatherscripts.js') }}"></script>
{% endblock %}
