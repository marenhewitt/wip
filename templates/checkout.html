{% extends "base.html" %}

{% block title %}WIP Checkout{% endblock %}

{% block content %}
    <h1>Cloud Purchase</h1>

    <div class="page-content">
        <form name="order" onsubmit="checkout(event);">
            <h3>Contact Information</h3>
            <input type="text" id="fname" name="fname" placeholder="First Name" required>
            <input type="text" id="lname" name="lname" placeholder="Last Name" required>
            <input type="text" id="phonenum" name="phonenum" placeholder="Phone Number" required>
            <input type="text" id="shipemail" name="shipemail" placeholder="Email" required>

            <h3>Shipping</h3>
            <input type="text" id="address" name="address" placeholder="Address Line 1" required>
            <input type="text" id="address2" name="address2" placeholder="Address Line 2 (optional)">
            <input type="text" id="city" name="city" placeholder="City" required>
            <input type="text" id="state" name="state" placeholder="State" required>
            <input type="text" id="shipzip" name="shipzip" placeholder="Zipcode" required>

            <h3>Payment</h3>
            <input type="text" id="cardname" name="cardname" placeholder="Cardholder Name" required>
            <input type="text" id="cardnum" name="cardnum" placeholder="Card Number" required>
            <input type="text" id="expdate" name="expdate" placeholder="Expiry Date" required>
            <input type="text" id="seccode" name="seccode" placeholder="Security Code" required>

            <hr>

            <div id="checkoutbox">
                <h3>Order Summary</h3>
                <h4>Total $99.99</h4>
            </div>

            <input type="submit" value="Checkout" class="btn-primary">
        </form>
    </div>
{% endblock %}

{% block scripts %}
    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
{% endblock %}
